<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Chat App</title>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #eef5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #C0D7D6; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #3a4f4f; }
        button:hover { background: #b0caca; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Créer un compte ✨</h2>
        <form method="POST" action="/register">
            <input type="email" name="email" placeholder="Adresse Email" required>
            <input type="text" name="username" placeholder="Pseudo" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit">S'inscrire</button>
        </form>
        <p style="font-size: 0.8rem; margin-top: 20px;">Déjà un compte ? <a href="/login">Se connecter</a></p>
    </div>
</body>
</html>
