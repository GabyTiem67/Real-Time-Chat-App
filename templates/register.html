<!DOCTYPE html>
<!--
  register.html — User Registration Page
  ========================================
  Served at GET /register.
  Submits new account details to POST /register, which Flask validates,
  hashes the password, and inserts into the 'users' table.

  On success  → Flask redirects to /login.
  On duplicate email or username → Flask returns an inline error message.

  Styling mirrors login.html for visual consistency:
  centred card on a soft teal background, pill inputs, and a
  mint-green submit button (slightly different from login's salmon
  so the two pages feel distinct at a glance).
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — Chat App</title>
    <style>
        /* ── Page layout ──
           Full-viewport flex container that centres the card
           both horizontally and vertically. */
        body {
            font-family: 'DM Sans', sans-serif;
            background: #eef5f5;           /* soft teal-white background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* ── Card ──
           White rounded card with a subtle drop shadow.
           Fixed width keeps the layout tidy. */
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 300px;
        }

        /* ── Inputs ──
           Full-width fields with comfortable padding.
           box-sizing: border-box prevents overflow. */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* ── Submit button ──
           Mint-green fill to differentiate from the login page's salmon.
           Darkens on hover for clear interactive feedback. */
        button {
            width: 100%;
            padding: 12px;
            background: #C0D7D6;           /* mint-cyan — matches app palette */
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #3a4f4f;               /* dark teal text for legibility */
        }
        button:hover { background: #b0caca; }
    </style>
</head>
<body>
    <!-- ── Registration card ──────────────────────────────────────── -->
    <div class="box">
        <h2>Create an account </h2>

        <!--
          Form submits via POST to /register.
          Flask reads request.form['email'], ['username'], ['password'].
          'required' attributes provide basic client-side validation.
          Duplicate email/username → IntegrityError → error page from Flask.
        -->
        <form method="POST" action="/register">
            <input type="email"  name="email"    placeholder="Email address" required>
            <input type="text"   name="username" placeholder="Username"      required>
            <input type="password" name="password" placeholder="Password"    required>
            <button type="submit">Sign up</button>
        </form>

        <!-- Navigation link for users who already have an account -->
        <p style="font-size: 0.8rem; margin-top: 20px;">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
</body>
</html>
